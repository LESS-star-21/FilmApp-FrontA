<div class="auth-container">
  <div class="auth-card">
    <h1>FilmApp</h1>
    <p>Tu diario personal de películas y series</p>

    <div class="tabs">
      <button class="tab" [class.active]="activeTab === 'login'" (click)="setTab('login')">Iniciar sesión</button>
      <button class="tab" [class.active]="activeTab === 'register'" (click)="setTab('register')">Registrarse</button>
    </div>

    @if (activeTab === 'login') {
      <form class="auth-form">
        <div class="form-group">
          <label for="email">Email</label>
          <input [(ngModel)]="email" id="email" type="email" placeholder="Ingresa tu email" name="email" />
        </div>
        <div class="form-group">
          <label for="password">Contraseña</label>
          <input [(ngModel)]="password" id="password" type="password" placeholder="Ingresa tu contraseña" name="password" />
        </div>
        @if (error) {
          <p class="error-msg">{{ error }}</p>
        }
        <button type="button" class="submit-btn" [disabled]="loading" (click)="sendLogin()">
          {{ loading ? 'Ingresando...' : 'Ingresar' }}
        </button>
      </form>
    }

    @if (activeTab === 'register') {
      <form class="auth-form">
        <div class="form-group">
          <label for="name">Nombre</label>
          <input [(ngModel)]="name" id="name" type="text" placeholder="Ingresa tu nombre" name="name" />
        </div>
        <div class="form-group">
          <label for="regEmail">Email</label>
          <input [(ngModel)]="regEmail" id="regEmail" type="email" placeholder="Ingresa tu email" name="regEmail" />
        </div>
        <div class="form-group">
          <label for="regPassword">Contraseña</label>
          <input [(ngModel)]="regPassword" id="regPassword" type="password" placeholder="Mínimo 6 caracteres" name="regPassword" />
        </div>
        @if (error) {
          <p class="error-msg">{{ error }}</p>
        }
        <button type="button" class="submit-btn" [disabled]="loading" (click)="sendRegister()">
          {{ loading ? 'Registrando...' : 'Crear cuenta' }}
        </button>
      </form>
    }
  </div>
</div>
